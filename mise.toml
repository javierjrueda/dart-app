# DART Project Configuration with mise
# Simple unified development environment using only mise + orbstack

[tools]
node = "18.19.0"

# No [env] section - environment variables will come from global .env file

[tasks.install]
description = "Install all dependencies"
run = [
  "echo '📦 Installing dependencies...'",
  "cd backend && npm install",
  "cd frontend && npm install",
  "echo '✅ Dependencies installed!'"
]

[tasks.dev]
description = "Start development servers with orbstack"
run = [
  "echo '🚀 Starting DART development...'",
  "echo '🌐 Frontend: http://localhost:3000'", 
  "echo '🔧 Backend: http://localhost:3001'",
  "echo '☁️  MongoDB Atlas (Cloud)'",
  "mise run dev:setup",
  "mise run dev:start"
]



[tasks."dev:start"]
description = "Start both servers"
run = [
  '''
  echo "🚀 Starting servers..."
  
  # Function to cleanup on exit
  cleanup() {
    echo "🛑 Stopping servers..."
    jobs -p | xargs -r kill
    exit 0
  }
  trap cleanup INT TERM

  # Start backend
  echo "🔧 Starting backend..."
  cd backend && npm run dev &
  BACKEND_PID=$!
  
  # Start frontend  
  echo "🌐 Starting frontend..."
  cd frontend && npm run dev &
  FRONTEND_PID=$!
  
  # Wait for processes
  wait $BACKEND_PID $FRONTEND_PID
  '''
]

[tasks."dev:setup"]
description = "Setup environment and check prerequisites"
run = [
  "echo '📝 Setting up development environment...'",
  "echo '✅ Using global .env file for environment variables'",
  "echo '☁️  Using MongoDB Atlas (cloud database)'",
  "echo '🔧 Environment setup complete!'"
]

[tasks."dev:mongo-local"]
description = "Start local MongoDB with Docker (alternative to cloud)"
run = [
  "echo '🗄️  Starting local MongoDB with Docker...'",
  "docker-compose up -d mongodb",
  "echo '✅ Local MongoDB running at localhost:27017'"
]

[tasks.clean]
description = "Clean dependencies and build files"
run = [
  "rm -rf backend/node_modules backend/dist",
  "rm -rf frontend/node_modules frontend/.next",
  "docker-compose down -v",
  "echo '🧹 Cleaned project!'"
]

[tasks.reset]
description = "Clean and reinstall everything"
run = [
  "mise run clean",
  "mise run install",
  "echo '🔄 Project reset complete!'"
]


# ===== DEPLOYMENT TASKS =====

[tasks."deploy:check"]
description = "Check deployment prerequisites"
run = [
  "echo '🔍 Checking deployment prerequisites...'",
  "echo '📦 Checking CLIs:'",
  "command -v railway >/dev/null 2>&1 && echo '✅ Railway CLI installed' || echo '❌ Railway CLI missing - run: npm install -g @railway/cli'",
  "command -v vercel >/dev/null 2>&1 && echo '✅ Vercel CLI installed' || echo '❌ Vercel CLI missing - run: npm install -g vercel'",
  "echo '🔐 Checking authentication:'",
  "cd backend && railway whoami >/dev/null 2>&1 && echo '✅ Railway authenticated' || echo '❌ Railway not authenticated - run: railway login'",
  "cd frontend && vercel whoami >/dev/null 2>&1 && echo '✅ Vercel authenticated' || echo '❌ Vercel not authenticated - run: vercel login'",
]

[tasks."deploy:setup"]
description = "Install deployment CLIs and setup authentication"
run = [
  "echo '🛠️  Setting up deployment tools...'",
  "echo '📦 Installing CLIs...'",
  "npm install -g @railway/cli vercel",
  "echo '🔐 Please authenticate with both services:'",
  "echo '1️⃣  Railway authentication:'",
  "railway login",
  "echo '2️⃣  Vercel authentication:'", 
  "vercel login",
  "echo '✅ Deployment setup complete!'"
]

[tasks."build:backend"]
description = "Build backend for production"
run = [
  "echo '🔧 Building backend...'",
  "cd backend && npm install",
  "cd backend && npm run build",
  "echo '✅ Backend build complete!'"
]

[tasks."build:frontend"] 
description = "Build frontend for production"
run = [
  "echo '🌐 Building frontend...'",
  "cd frontend && npm install",
  "cd frontend && npm run build",
  "echo '✅ Frontend build complete!'"
]

[tasks."build:all"]
description = "Build both frontend and backend"
run = [
  "echo '🏗️  Building entire application...'",
  "mise run build:backend",
  "mise run build:frontend",
  "echo '✅ All builds complete!'"
]

[tasks."deploy:backend"]
description = "Deploy backend to Railway"
run = [
  "echo '🚂 Deploying backend to Railway...'",
  "mise run build:backend",
  "cd backend && railway up",
  "echo '✅ Backend deployed to Railway!'"
]

[tasks."deploy:frontend"]
description = "Deploy frontend to Vercel" 
run = [
  "echo '▲ Deploying frontend to Vercel...'",
  "cd frontend",
  "vercel --prod",
  "echo '✅ Frontend deployed to Vercel!'"
]

[tasks."deploy:all"]
description = "Deploy both frontend and backend simultaneously"
run = [
  '''
  echo "🚀 Starting full deployment..."
  
  # Check prerequisites first
  mise run deploy:check
  
  echo "🏗️  Building applications..."
  mise run build:all
  
  echo "📤 Deploying to production..."
  echo "🚂 Deploying backend to Railway..."
  cd backend && railway up &
  BACKEND_PID=$!
  
  echo "▲ Deploying frontend to Vercel..."
  cd frontend && vercel --prod &
  FRONTEND_PID=$!
  
  # Wait for both deployments to complete
  echo "⏳ Waiting for deployments to complete..."
  wait $BACKEND_PID
  echo "✅ Backend deployment complete!"
  
  wait $FRONTEND_PID  
  echo "✅ Frontend deployment complete!"
  
  echo "🎉 Full deployment successful!"
  echo "📋 Next steps:"
  echo "  1. Check Railway dashboard for backend URL"
  echo "  2. Check Vercel dashboard for frontend URL"
  echo "  3. Update CORS settings if needed"
  echo "  4. Test the deployed application"
  '''
]

[tasks."deploy:status"]
description = "Check deployment status"
run = [
  "echo '📊 Checking deployment status...'",
  "echo '🚂 Railway (Backend):'",
  "cd backend && railway status",
  "echo '▲ Vercel (Frontend):'", 
  "cd frontend && vercel ls",
]

[tasks."deploy:logs"]
description = "View deployment logs"
run = [
  "echo '📋 Viewing deployment logs...'",
  "echo '🚂 Railway Backend Logs:'",
  "cd backend && railway logs",
  "echo '▲ Vercel Frontend Logs:'",
  "cd frontend && vercel logs"
] 