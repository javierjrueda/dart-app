# DART Project Configuration with mise
# Simple unified development environment using only mise + orbstack

[tools]
node = "18.19.0"

# No [env] section - environment variables will come from global .env file

[tasks.install]
description = "Install all dependencies"
run = [
  "echo '📦 Installing dependencies...'",
  "cd backend && npm install",
  "cd frontend && npm install",
  "echo '✅ Dependencies installed!'"
]

[tasks.dev]
description = "Start development servers with orbstack"
run = [
  "echo '🚀 Starting DART development...'",
  "echo '🌐 Frontend: http://localhost:3000'", 
  "echo '🔧 Backend: http://localhost:3001'",
  "echo '☁️  MongoDB Atlas (Cloud)'",
  "mise run dev:setup",
  "mise run dev:start"
]

[tasks."dev:setup"]
description = "Setup environment and check prerequisites"
run = [
  "echo '📝 Setting up development environment...'",
  "echo '✅ Using global .env file for environment variables'",
  "echo '☁️  Using MongoDB Atlas (cloud database)'",
  "echo '🔧 Environment setup complete!'"
]

[tasks."dev:start"]
description = "Start both servers"
run = [
  '''
  echo "🚀 Starting servers..."
  
  # Function to cleanup on exit
  cleanup() {
    echo "🛑 Stopping servers..."
    jobs -p | xargs -r kill
    exit 0
  }
  trap cleanup INT TERM

  # Start backend
  echo "🔧 Starting backend..."
  cd backend && npm run dev &
  BACKEND_PID=$!
  
  # Start frontend  
  echo "🌐 Starting frontend..."
  cd frontend && npm run dev &
  FRONTEND_PID=$!
  
  # Wait for processes
  wait $BACKEND_PID $FRONTEND_PID
  '''
]

[tasks."dev:mongo-local"]
description = "Start local MongoDB with Docker (alternative to cloud)"
run = [
  "echo '🗄️  Starting local MongoDB with Docker...'",
  "docker-compose up -d mongodb",
  "echo '✅ Local MongoDB running at localhost:27017'"
]

[tasks.clean]
description = "Clean dependencies and build files"
run = [
  "rm -rf backend/node_modules backend/dist",
  "rm -rf frontend/node_modules frontend/.next",
  "docker-compose down -v",
  "echo '🧹 Cleaned project!'"
]

[tasks.reset]
description = "Clean and reinstall everything"
run = [
  "mise run clean",
  "mise run install",
  "echo '🔄 Project reset complete!'"
]

[tasks."env:check"]
description = "Check environment configuration"
run = [
  "echo '🔍 Checking environment configuration...'",
  "echo 'Global .env file:'",
  "test -f .env && echo '✅ .env exists' || echo '❌ .env missing'",
  "echo 'MongoDB URI configured:'",
  "test -n \"$MONGODB_URI\" && echo '✅ MONGODB_URI set' || echo '❌ MONGODB_URI missing'",
  "echo 'Node version:'",
  "node --version"
] 